kind = "web"
previewPath = "/"
title = "SMS Webhook Demo"
version = "1.0.0"
id = "artifacts/webhook-demo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23940

[services.development]
run = "pnpm --filter @workspace/webhook-demo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/webhook-demo", "run", "build" ]
publicDir = "artifacts/webhook-demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23940"
BASE_PATH = "/"
